<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathCore</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="js/metadata.js"></script>
</head>
<body>
    <div class="bg-mesh"></div>
    <canvas id="particles-canvas"></canvas>

    <header>
        <div class="logo" onclick="app.renderView('home')">
            <div class="logo-icon">MC</div>
            <span class="logo-wordmark">MATH<span class="gradient-text">CORE</span></span>
        </div>

        <div class="nav-actions">
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="uz">UZ</button>
            </div>
            <button class="btn-secondary" id="nav-results" onclick="app.renderView('history')">Результаты</button>
        </div>
    </header>

    <main id="app-root"></main>

    <script src="js/app.js"></script>
</body>
</html>
